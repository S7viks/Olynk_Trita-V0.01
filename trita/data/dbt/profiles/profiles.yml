# Loaded via scripts/run_dbt.py (env from DATABASE_URL). Do not commit secrets.
trita:
  target: dev
  outputs:
    dev:
      type: postgres
      host: "{{ env_var('DBT_HOST') }}"
      user: "{{ env_var('DBT_USER') }}"
      password: "{{ env_var('DBT_PASSWORD') }}"
      port: "{{ env_var('DBT_PORT') | int }}"
      dbname: "{{ env_var('DBT_DATABASE') }}"
      schema: public
      threads: 4
