[project]
name = "trita-decisions"
version = "0.0.1"
description = "Decision contract, emitter, suppression"
requires-python = ">=3.11"
dependencies = [
    "psycopg[binary]>=3.2.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/trita_decisions"]
