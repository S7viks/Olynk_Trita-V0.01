# Trita V0.0.1 — Render Blueprint (T-P0-005 / VA-10) — DEFERRED
# Requires payment card (plan: starter). Local dev: docs/LOCAL-DEV.md
# Apply from Dashboard when ready; fill env vars marked sync: false.
# Docs: infra/render/README.md

services:
  - type: web
    name: trita-api
    runtime: python
    plan: starter
    region: singapore
    rootDir: trita/apps/api
    buildCommand: pip install -e . && pip install -e ../../data/dlt
    startCommand: uvicorn trita_api.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: PYTHON_VERSION
        value: "3.11.11"
      - key: DATABASE_URL
        sync: false
      - key: SUPABASE_JWT_SECRET
        sync: false
      - key: API_JWT_SECRET
        sync: false
      - key: CONNECTOR_TOKEN_KEY
        sync: false
      - key: SHOPIFY_CLIENT_ID
        sync: false
      - key: SHOPIFY_CLIENT_SECRET
        sync: false
      - key: SHOPIFY_OAUTH_REDIRECT_URI
        sync: false
      - key: SHOPIFY_REDIRECT_URI
        sync: false
      - key: SHOPIFY_SCOPES
        value: read_orders,read_inventory,read_products
      - key: LITELLM_PROXY_URL
        fromService:
          name: trita-litellm
          type: web
          property: hostport
      - key: LITELLM_TENANT_TOKEN_BUDGET
        value: "5000"
      - key: NEXT_PUBLIC_WEB_URL
        sync: false

  - type: web
    name: trita-litellm
    runtime: python
    plan: starter
    region: singapore
    rootDir: trita/services/litellm
    buildCommand: pip install 'litellm[proxy]>=1.55.0'
    startCommand: litellm --config config.yaml --host 0.0.0.0 --port $PORT
    healthCheckPath: /health/liveliness
    autoDeploy: true
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.11"
      - key: GEMINI_API_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: LITELLM_MASTER_KEY
        sync: false
